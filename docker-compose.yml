version: '3.8'

services:
  # 1. The Redis Cache (Velocity Engine)
  redis-cache:
    image: redis:7.2-alpine
    container_name: zbank-redis
    ports:
      - "6379:6379"
    networks:
      - zbank-network
    command: redis-server --save 60 1 --loglevel warning

  # 2. The PostgreSQL Database (Static Rules)
  postgres-db:
    image: postgres:16-alpine
    container_name: zbank-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: zbank_fraud
    ports:
      - "5432:5432"
    networks:
      - zbank-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

networks:
  zbank-network:
    driver: bridge

volumes:
  postgres-data: